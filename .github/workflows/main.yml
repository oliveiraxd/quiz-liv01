name: Deploy to HostGator FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 Install Dependencies and Build
        run: |
          npm install
          npm run build

      - name: 📂 Sync files to HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/quiz01/ # Substitua pelo caminho correto no seu cPanel, se não for esse
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
